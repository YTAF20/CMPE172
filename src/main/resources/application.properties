spring.application.name=appointment-scheduler

# SQLite DataSource
spring.datasource.url=jdbc:sqlite:advising.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Initialize schema and seed data on startup
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# Logging
logging.level.com.advising=INFO
logging.level.org.springframework.jdbc=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n

# Server
server.port=8080
