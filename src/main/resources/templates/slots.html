<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Available Slots</title>
</head>
<body>
    <h1>Academic Advising Appointment Scheduler</h1>
    <nav>
        <a th:href="@{/}">Home</a> |
        <a th:href="@{/slots}">Available Slots</a> |
        <a th:href="@{/appointments}">Appointments</a>
    </nav>
    <hr/>

    <h2>Available Time Slots</h2>

    <p th:if="${error}" style="color: red;" th:text="${error}"></p>

    <p th:if="${#lists.isEmpty(slots)}">No open slots available right now.</p>

    <table border="1" th:unless="${#lists.isEmpty(slots)}">
        <thead>
            <tr>
                <th>ID</th>
                <th>Advisor</th>
                <th>Start Time</th>
                <th>End Time</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="slot : ${slots}">
                <td th:text="${slot.slotId}"></td>
                <td th:text="${slot.advisorName}"></td>
                <td th:text="${slot.startTime}"></td>
                <td th:text="${slot.endTime}"></td>
                <td><a th:href="@{/slots/{id}/book(id=${slot.slotId})}">Book</a></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
