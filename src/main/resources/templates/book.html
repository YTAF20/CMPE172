<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment - Academic Advising Scheduler</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f7fa; color: #333; }
        header { background: #1a3a5c; color: white; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
        header h1 { font-size: 1.4rem; }
        nav a { color: #aec6e8; text-decoration: none; margin-left: 20px; font-size: 0.95rem; }
        nav a:hover { color: white; }
        .container { max-width: 560px; margin: 48px auto; padding: 0 24px; }
        h2 { color: #1a3a5c; margin-bottom: 6px; }
        .subtitle { color: #666; font-size: 0.95rem; margin-bottom: 28px; }
        .slot-summary { background: #e8f0fb; border-left: 4px solid #2e6da4; padding: 16px 20px; border-radius: 6px; margin-bottom: 28px; }
        .slot-summary p { margin: 4px 0; font-size: 0.95rem; }
        .slot-summary strong { color: #1a3a5c; }
        .form-card { background: white; border-radius: 10px; padding: 32px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        label { display: block; margin-bottom: 6px; font-weight: 600; color: #1a3a5c; font-size: 0.9rem; }
        select { width: 100%; padding: 10px 12px; border: 1px solid #cdd5df; border-radius: 6px; font-size: 0.95rem; margin-bottom: 24px; }
        select:focus { outline: none; border-color: #2e6da4; }
        .btn-row { display: flex; gap: 12px; }
        .btn { padding: 11px 24px; border-radius: 6px; font-size: 0.95rem; font-weight: 600; cursor: pointer; text-decoration: none; border: none; }
        .btn-confirm { background: #1a3a5c; color: white; flex: 1; }
        .btn-confirm:hover { background: #2e6da4; }
        .btn-cancel { background: #e9eef4; color: #555; }
        .btn-cancel:hover { background: #d0dae6; }
        footer { text-align: center; padding: 20px; background: #e9eef4; color: #888; font-size: 0.85rem; margin-top: 60px; }
    </style>
</head>
<body>
<header>
    <h1>SJSU Academic Advising Scheduler</h1>
    <nav>
        <a th:href="@{/}">Home</a>
        <a th:href="@{/slots}">Available Slots</a>
        <a th:href="@{/appointments}">My Appointments</a>
    </nav>
</header>

<div class="container">
    <h2>Book Appointment</h2>
    <p class="subtitle">Confirm your appointment details below.</p>

    <div class="slot-summary">
        <p><strong>Advisor:</strong> <span th:text="${slot.advisorName}"></span></p>
        <p><strong>Date &amp; Time:</strong> <span th:text="${slot.startTime}"></span> &ndash; <span th:text="${slot.endTime}"></span></p>
        <p><strong>Slot ID:</strong> <span th:text="${slot.slotId}"></span></p>
    </div>

    <div class="form-card">
        <form th:action="@{/appointments/book}" method="post">
            <input type="hidden" name="slotId" th:value="${slot.slotId}" />

            <label for="studId">Select Your Name (Student)</label>
            <select id="studId" name="studId" required>
                <option value="" disabled selected>-- Choose student --</option>
                <option th:each="student : ${students}"
                        th:value="${student.userId}"
                        th:text="${student.name}"></option>
            </select>

            <div class="btn-row">
                <button type="submit" class="btn btn-confirm">Confirm Booking</button>
                <a th:href="@{/slots}" class="btn btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
</div>

<footer>
    &copy; 2026 SJSU Academic Advising Scheduling System &mdash; CMPE 172 Term Project
</footer>
</body>
</html>
