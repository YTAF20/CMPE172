<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Book Appointment</title>
</head>
<body>
    <h1>Academic Advising Appointment Scheduler</h1>
    <nav>
        <a th:href="@{/}">Home</a> |
        <a th:href="@{/slots}">Available Slots</a> |
        <a th:href="@{/appointments}">Appointments</a>
    </nav>
    <hr/>

    <h2>Book Appointment</h2>

    <p><strong>Advisor:</strong> <span th:text="${slot.advisorName}"></span></p>
    <p><strong>Time:</strong> <span th:text="${slot.startTime}"></span> - <span th:text="${slot.endTime}"></span></p>

    <form th:action="@{/appointments/book}" method="post">
        <input type="hidden" name="slotId" th:value="${slot.slotId}" />

        <label for="studentName">Your Full Name:</label><br/>
        <input type="text" id="studentName" name="studentName" placeholder="Enter your full name" required /><br/><br/>

        <button type="submit">Confirm Booking</button>
        <a th:href="@{/slots}">Cancel</a>
    </form>
</body>
</html>
