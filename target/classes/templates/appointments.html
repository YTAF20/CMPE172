<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Appointments</title>
</head>
<body>
    <h1>Academic Advising Appointment Scheduler</h1>
    <nav>
        <a th:href="@{/}">Home</a> |
        <a th:href="@{/slots}">Available Slots</a> |
        <a th:href="@{/appointments}">Appointments</a>
    </nav>
    <hr/>

    <h2>All Appointments</h2>

    <p th:if="${message}" style="color: green;" th:text="${message}"></p>
    <p th:if="${error}" style="color: red;" th:text="${error}"></p>

    <p th:if="${#lists.isEmpty(appointments)}">
        No appointments yet. <a th:href="@{/slots}">Book one here.</a>
    </p>

    <table border="1" th:unless="${#lists.isEmpty(appointments)}">
        <thead>
            <tr>
                <th>ID</th>
                <th>Student</th>
                <th>Advisor</th>
                <th>Start Time</th>
                <th>End Time</th>
                <th>Status</th>
                <th>Booked On</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="app : ${appointments}">
                <td th:text="${app.appId}"></td>
                <td th:text="${app.studentName}"></td>
                <td th:text="${app.advisorName}"></td>
                <td th:text="${app.startTime}"></td>
                <td th:text="${app.endTime}"></td>
                <td th:text="${app.status}"></td>
                <td th:text="${app.createTime}"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
