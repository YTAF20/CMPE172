<svg xmlns="http://www.w3.org/2000/svg" width="700" height="320" font-family="Times New Roman, serif">
  <rect width="700" height="320" fill="white"/>

  <!-- H1 -->
  <text x="20" y="36" font-size="22" font-weight="bold" fill="black">Academic Advising Appointment Scheduler</text>

  <!-- Nav -->
  <text x="20" y="60" font-size="14" fill="black">
    <tspan text-decoration="underline" fill="blue">Home</tspan>
    <tspan fill="black"> | </tspan>
    <tspan text-decoration="underline" fill="blue">Available Slots</tspan>
    <tspan fill="black"> | </tspan>
    <tspan text-decoration="underline" fill="blue">Appointments</tspan>
  </text>

  <!-- HR -->
  <line x1="20" y1="72" x2="680" y2="72" stroke="black" stroke-width="1"/>

  <!-- H2 -->
  <text x="20" y="98" font-size="18" font-weight="bold" fill="black">Booking Confirmed</text>

  <!-- Message -->
  <text x="20" y="124" font-size="14" fill="black">Your appointment has been successfully booked.</text>

  <!-- br + links -->
  <text x="20" y="158" font-size="14" fill="black">
    <tspan text-decoration="underline" fill="blue">View Appointments</tspan>
    <tspan fill="black"> | </tspan>
    <tspan text-decoration="underline" fill="blue">Book Another Slot</tspan>
  </text>

  <!-- Label -->
  <text x="350" y="300" font-size="11" fill="#aaa" text-anchor="middle" font-style="italic">Wireframe: Booking Confirmation (POST /appointments/book)</text>
</svg>
