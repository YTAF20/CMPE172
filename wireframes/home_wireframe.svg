  <rect x="550" y="256" width="220" height="130" fill="white" rx="8" stroke="#dde3ec" stroke-width="1"/>
  <text x="660" y="290" font-size="22" text-anchor="middle" fill="#555">&#128203;</text>
  <rect x="590" y="300" width="140" height="14" fill="#e0e7f0" rx="3"/>
