  <rect x="290" y="256" width="220" height="130" fill="white" rx="8" stroke="#dde3ec" stroke-width="1"/>
  <text x="400" y="290" font-size="22" text-anchor="middle" fill="#555">&#9989;</text>
  <rect x="330" y="300" width="140" height="14" fill="#e0e7f0" rx="3"/>
  <text x="400" y="313" font-size="11" text-anchor="middle" fill="#1a3a5c" font-weight="bold">Instant Booking</text>
  <rect x="320" y="322" width="160" height="10" fill="#eef1f6" rx="2"/>
  <rect x="330" y="337" width="140" height="10" fill="#eef1f6" rx="2"/>
  <rect x="340" y="352" width="120" height="10" fill="#eef1f6" rx="2"/>

